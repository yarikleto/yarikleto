name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#5CC8C8&color_dots=#ebedf0,#b2dfdb,#80cbc4,#4db6ac,#5CC8C8
            dist/github-snake-dark.svg?color_snake=#5CC8C8&color_dots=#161b22,#1a3a3a,#2D8A8A,#44AAAA,#5CC8C8

      - name: Remove progress bar
        run: |
          cd dist
          python3 << 'PYEOF'
          import re, glob

          def remove_keyframes(content, prefix):
              result = content
              while True:
                  match = re.search(rf'@keyframes {prefix}\d', result)
                  if not match:
                      break
                  idx = match.start()
                  brace_start = result.index('{', idx)
                  depth = 0
                  end = brace_start
                  for j in range(brace_start, len(result)):
                      if result[j] == '{':
                          depth += 1
                      elif result[j] == '}':
                          depth -= 1
                          if depth == 0:
                              end = j + 1
                              break
                  result = result[:idx] + result[end:]
              return result

          for f in glob.glob("github-snake*.svg"):
              with open(f) as fh:
                  c = fh.read()
              c = remove_keyframes(c, 'u')
              c = re.sub(r'<rect class="u[^"]*"[^/]*/>', '', c)
              c = re.sub(r'\.u\.[^}]*\}', '', c)
              c = re.sub(r'\.u\{[^}]*\}', '', c)
              c = c.replace('viewBox="-16 -32 880 192" width="880" height="192"',
                            'viewBox="-16 -32 880 140" width="880" height="140"')
              with open(f, 'w') as fh:
                  fh.write(c)
              print(f"Cleaned {f}: braces {{ {c.count('{')} }} {c.count('}')}")
          PYEOF

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
