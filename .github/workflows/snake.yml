name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#58A6FF&color_dots=#161b22,#0e4429,#264d3b,#3b6daa,#58A6FF
            dist/github-snake-dark.svg?color_snake=#58A6FF&color_dots=#161b22,#0d2240,#1a3a5c,#3b6daa,#58A6FF

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
